<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<style>:root {
  font-family: "Geist", system-ui, sans-serif;
  --font-sans: "Geist", system-ui, sans-serif;

  --background: oklch(0.985 0.002 75);
  --foreground: oklch(0.145 0.005 75);
  --card: oklch(1 0 0);
  --card-foreground: oklch(0.145 0.005 75);
  --popover: oklch(1 0 0);
  --popover-foreground: oklch(0.145 0.005 75);
  --primary: oklch(0.205 0.01 75);
  --primary-foreground: oklch(0.985 0.002 75);
  --secondary: oklch(0.97 0.003 75);
  --secondary-foreground: oklch(0.205 0.01 75);
  --muted: oklch(0.955 0.005 75);
  --muted-foreground: oklch(0.475 0.008 75);
  --accent: oklch(0.97 0.003 75);
  --accent-foreground: oklch(0.205 0.01 75);
  --destructive: oklch(0.577 0.245 27.325);
  --border: oklch(0.922 0 0);
  --input: oklch(0.922 0 0);
  --ring: oklch(0.708 0 0);
  --chart-1: oklch(0.87 0 0);
  --chart-2: oklch(0.556 0 0);
  --chart-3: oklch(0.439 0 0);
  --chart-4: oklch(0.371 0 0);
  --chart-5: oklch(0.269 0 0);
  --radius: 0.625rem;
}

@media (prefers-color-scheme: dark) {
  :root {
    --background: oklch(0.1 0.005 75);
    --foreground: oklch(0.94 0.005 75);
    --card: oklch(0.13 0.005 75);
    --card-foreground: oklch(0.94 0.005 75);
    --popover: oklch(0.13 0.005 75);
    --popover-foreground: oklch(0.94 0.005 75);
    --primary: oklch(0.92 0.005 75);
    --primary-foreground: oklch(0.1 0.005 75);
    --secondary: oklch(0.2 0.005 75);
    --secondary-foreground: oklch(0.94 0.005 75);
    --muted: oklch(0.175 0.005 75);
    --muted-foreground: oklch(0.55 0.01 75);
    --accent: oklch(0.2 0.005 75);
    --accent-foreground: oklch(0.94 0.005 75);
    --destructive: oklch(0.704 0.191 22.216);
    --border: oklch(1 0 0 / 10%);
    --input: oklch(1 0 0 / 15%);
    --ring: oklch(0.556 0 0);
    --chart-1: oklch(0.87 0 0);
    --chart-2: oklch(0.556 0 0);
    --chart-3: oklch(0.439 0 0);
    --chart-4: oklch(0.371 0 0);
    --chart-5: oklch(0.269 0 0);
  }
}

*{margin:0;padding:0;box-sizing:border-box}
body{background:var(--background);color:var(--foreground);font-family:var(--font-sans,"Geist",system-ui,sans-serif)}
</style>
</head>
<body>
<div id="root"></div>
