name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: typecheck · lint · test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v4
        with:
          version: 11.5.2

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - run: pnpm typecheck

      - run: pnpm lint

      # Integration tests start Postgres via testcontainers; Docker is
      # preinstalled on ubuntu-latest. No secrets required.
      - run: pnpm test

  mutation:
    name: mutation (diff)
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    # Diff-scoped: only the source files changed vs the PR base are mutated, so
    # runs take minutes instead of a full cold sweep. Gates merges — a PR that
    # drops the mutation score on files it touches (below the 60% break
    # threshold) fails. PRs touching no mutatable source pass trivially.
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: pnpm/action-setup@v4
        with:
          version: 11.5.2

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Mutation test changed files
        env:
          BASE_REF: ${{ github.base_ref }}
        run: |
          git fetch --no-tags origin "$BASE_REF:refs/remotes/origin/$BASE_REF"
          bash scripts/mutate-diff.sh "origin/$BASE_REF"
