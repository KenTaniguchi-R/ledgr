name: Question
description: Ask a question about setup, usage, or configuration
labels: ["question"]
body:
  - type: markdown
    attributes:
      value: |
        Have a question? Check the [README](https://github.com/KenTaniguchi-R/ledgr#readme) first, then ask here if you still need help.

  - type: textarea
    id: question
    attributes:
      label: Your question
      description: What would you like to know?
    validations:
      required: true

  - type: textarea
    id: context
    attributes:
      label: Context
      description: Any relevant details about your setup or what you've tried.
